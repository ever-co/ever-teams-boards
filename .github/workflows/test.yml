name: Tests

on: pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node.js 18.x
        uses: actions/setup-node@v7
        with:
          node-version: 18.x
      - name: Install and test
        run: |
          yarn --frozen-lockfile
          yarn test:app
